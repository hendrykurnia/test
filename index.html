<!DOCTYPE html>
<html>
<head>
  <title>MCP API Test</title>
</head>
<body>

  <h3>MCP API Test</h3>

  <input type="text" id="inputText" placeholder="Enter text..." />
  <button onclick="sendRequestGenieAPI()">Submit (Genie API)</button>
  <button onclick="sendRequestMCP()">Submit (MCP)</button>

  <h4>Response:</h4>
  <pre id="outputText"></pre>

  <script>
    async function sendRequestGenieAPI() {
      const input = document.getElementById("inputText").value;
      const output = document.getElementById("outputText");

      output.textContent = "Loading...";

      const url = "https://apim.trial.workato.com/hendry-itbizpro/career-profile-genie-v1/career-genie-api";

      const payload = {
        request: input
      };

      try {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json",
	        "api-token": "61d53787304573c8a1217655a515233594abecfa98440712ec2dbb136cb24ad9"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);

      } catch (err) {
        output.textContent = "Error: " + err.message;
      }
    }

	
    async function sendRequestMCP() {
      const inputQuery = document.getElementById("inputText").value;
      const output = document.getElementById("outputText");

      output.textContent = "Loading...";

      const url = "https://2640.apim.mcp.trial.workato.com?wkt_token=55b5231daa7690b69b92806820acd8c44a145cbe2cfac0d813f4249d4363c1b6";

      const payload = {
	      jsonrpc: "2.0",
	      id: 1,
	      method: "tools/call",
	      params: {
	          name: "Get_Career_Profile_Information_and_Answer_the_related_Questions",
	          arguments: {
	              input: inputQuery
	          }
	      }
	  };

      try {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);

      } catch (err) {
        output.textContent = "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
